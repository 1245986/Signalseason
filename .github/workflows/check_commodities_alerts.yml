name: Commodity Price Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Check alerts
        id: check
        env:
          TG_TOKEN: ${{ secrets.CM_TG_TOKEN }}
          TG_CHAT:  ${{ secrets.CM_TG_CHAT }}
        run: |
          python check_commodities.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit updated alerts
        if: steps.check.outputs.exit_code == '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commodities_alerts.json
          git commit -m "chore: deactivate triggered commodity alerts"
          git push
